version: '3.8'

services:
  test-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql  # BD en memoria para tests rápidos
  
  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
  
  test-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"
    tmpfs:
      - /qdrant/storage

# Ejecutar tests:
# docker-compose -f docker-compose.test.yml up -d
# pytest tests/ -v --cov=. --cov-report=html