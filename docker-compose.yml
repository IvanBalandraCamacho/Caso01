services:
  # 1. Backend API (FastAPI)
  backend:
    build: ./backend
    container_name: ia_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # Database & Services
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - RAG_SERVICE_URL=http://rag-service:8080
      - RAG_SERVICE_API_KEY=${RAG_SERVICE_API_KEY:-}
      - RAG_SERVICE_ENABLED=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      rag-service:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # 2. Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      target: deps 
    container_name: ia_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/components.json:/app/components.json
      - ./frontend/next.config.mjs:/app/next.config.mjs
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    command: npm run dev

  # 3. Base de Datos (Metadata)
  mysql:
    image: mysql:8.0
    container_name: ia_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  # 4. Cache y Message Broker (Redis)
  redis:
    image: redis:7-alpine
    container_name: ia_redis
    ports:
      - "6379:6379"

  # 5. Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ia_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # 6. Servicio RAG (NUEVO)
  rag-service:
    build: ./rag-service
    container_name: ia_rag_service
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - qdrant
    volumes:
      - rag_data:/app/data

  # 7. Worker Asíncrono (Celery)
  celery_worker:
    build: ./backend
    container_name: ia_celery_worker
    command: celery -A core.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - RAG_SERVICE_URL=http://rag-service:8080
      - RAG_SERVICE_API_KEY=${RAG_SERVICE_API_KEY:-}
      - RAG_SERVICE_ENABLED=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      rag-service:
        condition: service_started

volumes:
  mysql_data:
  qdrant_data:
  rag_data: